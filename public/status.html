<!DOCTYPE html>
<html>
<head>
    <title>Songify - Backend Status</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a1a; color: white; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .loading { background: #FFA500; }
        .success { background: #28a745; }
        .error { background: #dc3545; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>🎵 Songify Backend Status Checker</h1>
    <p>Use this page to check if your Render backend is ready before using the main app.</p>
    
    <div id="status" class="status loading">⏳ Checking backend status...</div>
    <button onclick="checkStatus()">🔄 Check Again</button>
    <button onclick="openApp()">🚀 Open Songify App</button>

    <script>
        const API_URL = 'https://songify-v4q3.onrender.com';
        
        async function checkStatus() {
            const statusDiv = document.getElementById('status');
            statusDiv.className = 'status loading';
            statusDiv.innerHTML = '⏳ Checking backend status...';
            
            try {
                const response = await fetch(API_URL + '/health', {
                    method: 'GET',
                    timeout: 10000
                });
                
                if (response.ok) {
                    const text = await response.text();
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = '✅ Backend is ready! You can now use the app.';
                } else {
                    throw new Error('Backend not ready');
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Backend is still starting up. Please wait 1-2 minutes and try again.';
            }
        }
        
        function openApp() {
            window.open('/', '_blank');
        }
        
        // Auto-check on load
        checkStatus();
        
        // Auto-refresh every 30 seconds
        setInterval(checkStatus, 30000);
    </script>
</body>
</html>
